services:
  re-notifier:
    image: ghcr.io/andrewmy/re-notifier:latest
    container_name: re-notifier
    restart: unless-stopped
    volumes:
      - ./var:/app/var
      - ./.env:/app/.env
      - ./config/watch_profiles.local.php:/app/config/watch_profiles.local.php:ro
      - ./crontab:/app/crontab
